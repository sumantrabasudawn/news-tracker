<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AION Sentiment Console</title>
    <link rel="icon" type="image/png" href="AION%20Logo.png">

    <style>
        body {
            margin: 0;
            background: #020617;
            color: #f8fafc;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .container {
            max-width: 1050px;
            margin: auto;
            padding: 70px 28px;
        }

        .back {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }

        h1 {
            margin-top: 50px;
            font-size: 46px;
            letter-spacing: 2px;
        }

        .orange {
            color: #ff6a00;
        }

        p {
            color: #cbd5e1;
            font-size: 18px;
            line-height: 1.8;
            max-width: 850px;
        }

        .search-box {
            margin-top: 45px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 280px;
            padding: 18px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f8fafc;
            font-size: 16px;
        }

        button {
            padding: 18px 30px;
            border: none;
            border-radius: 8px;
            background: #ff6a00;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .results {
            margin-top: 45px;
            display: grid;
            gap: 22px;
        }

        .card {
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 26px;
        }

        .card h3 {
            margin-top: 0;
            color: #ff6a00;
        }

        .muted {
            color: #94a3b8;
            font-size: 14px;
        }

        .score {
            font-size: 38px;
            font-weight: 800;
        }
    </style>
</head>

<body>
    <div class="container">
        <a class="back" href="index.html">← Back to AION</a>

        <h1>AION <span class="orange">Sentiment Console</span></h1>

        <p>
            Search any company, issue, person, sector or business theme. AION will convert public signals into
            structured reputation judgement.
        </p>

        <div class="search-box">
            <input id="query"
                placeholder="Example: Genus Power smart meters, Schneider Electric India, UP power reforms">
            <button onclick="runSentiment()">Analyse Sentiment</button>
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        async function runSentiment() {
            const q = document.getElementById("query").value.trim();
            const results = document.getElementById("results");

            if (!q) {
                results.innerHTML = '<div class="card">Please enter a company, issue or topic.</div>';
                return;
            }

            results.innerHTML = `
        <div class="card">
            <h3>Analysing Live Signal</h3>
            <p>AION is reading Google News, X, sentiment, narrative state and Markov plausibility for <strong>${q}</strong>.</p>
        </div>
    `;

            try {
                const response = await fetch(`http://127.0.0.1:8000/api/sentiment?q=${encodeURIComponent(q)}`);
                const data = await response.json();

                const topStories = data.stories.slice(0, 6).map(story => `
            <div class="card">
                <h3>${story.title}</h3>
                <div class="muted">${story.source || "Source"} | ${story.published_at || ""} | ${story.sentiment}</div>
                <p>${story.summary || ""}</p>
                ${story.link ? `<p><a href="${story.link}" target="_blank" style="color:#ff6a00;">Open source →</a></p>` : ""}
            </div>
        `).join("");

                results.innerHTML = `
            <div class="card">
                <h3>AION Intelligence Signal</h3>
                <div class="muted">Generated at ${data.generated_at}</div>
                <p><strong>Query:</strong> ${data.query}</p>
            </div>

            <div class="card">
                <h3>Sentiment Index</h3>
                <div class="score">${data.score}</div>
                <p><strong>Mood:</strong> ${data.mood}</p>
                <p><strong>Total Signals:</strong> ${data.total}</p>
                <p><strong>Positive:</strong> ${data.positive} | <strong>Negative:</strong> ${data.negative} | <strong>Neutral:</strong> ${data.neutral}</p>
            </div>

            <div class="card">
                <h3>Narrative State</h3>
                <div class="score">${data.narrative_state}</div>
                <p><strong>Most Plausible Next State:</strong> ${data.most_plausible_next_state}</p>
                <p><strong>Markov Score:</strong> ${data.markov_score}</p>
                <p>${data.markov_judgement}</p>
            </div>

            <div class="card">
                <h3>Recommended Posture</h3>
                <p>${data.action}</p>
            </div>

            <div class="card">
                <h3>Top Live Signals</h3>
                <p class="muted">Showing top 6 extracted signals from Google News and X.</p>
            </div>

            ${topStories}
        `;

            } catch (error) {
                results.innerHTML = `
            <div class="card">
                <h3>Connection Error</h3>
                <p>AION could not connect to the local API. Make sure FastAPI is running.</p>
                <p class="muted">Run: uvicorn api_server:app --reload</p>
            </div>
        `;
            }
        }
    </script>

</body>

</html>
