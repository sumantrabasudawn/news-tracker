<!DOCTYPE html>
<html>
<head>
  <title>Aion Intelligence</title>

  <style>
    body {
      font-family: Helvetica, Arial, Calibri, sans-serif;
      background-color: #f6f1e9;
      color: #2b2b2b;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    /* MASTHEAD */

    .masthead {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand {
      font-size: 58px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .aion { color: #ff6a00; }
    .intelligence { color: #2b2b2b; }

    .subhead {
      font-size: 22px;
      color: #6b6b6b;
    }

    /* TICKER STRIP */

    .market-bar {
      border-top: 1px solid #ded8cf;
      border-bottom: 1px solid #ded8cf;
      padding: 10px 0;
      margin: 25px 0 40px;
      overflow: hidden;
      white-space: nowrap;
      background: #f6f1e9;
    }

    .market-track {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 45s linear infinite;
    }

    .market-item {
      display: inline-block;
      margin-right: 40px;
      font-size: 14px;
      color: #444;
    }

    .market-item span {
      font-weight: 700;
      color: #2b2b2b;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* CONTENT */

    .section {
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 22px;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
      font-size: 16px;
      line-height: 1.6;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- MASTHEAD -->
  <div class="masthead">

    <div class="brand">
      <span class="aion">AION</span>
      <span class="intelligence">INTELLIGENCE</span>
    </div>

    <div class="subhead" id="timestamp">
      Pulse Briefing and Analyses
    </div>

  </div>

  <!-- MARKET TICKER -->
  <div class="market-bar">
    <div class="market-track" id="market-data"></div>
  </div>

  <!-- CONTENT -->
  <div class="section">
    <div class="card">
      Your intelligence content goes here.
    </div>
  </div>

</div>

<!-- DYNAMIC TIMESTAMP -->
<script>
  const options = {
    timeZone: 'Asia/Kolkata',
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  };

  const now = new Date().toLocaleString('en-IN', options);

  document.getElementById("timestamp").innerHTML =
    "Pulse Briefing and Analyses | " + now + " IST";
</script>

<!-- MARKET DATA -->
<script>
  const marketValues = [
    "DOW JONES: <span>38,900</span>",
    "NASDAQ: <span>16,200</span>",
    "S&P 500: <span>5,150</span>",
    "NIFTY 50: <span>22,400</span>",
    "SENSEX: <span>73,800</span>",
    "NIKKEI: <span>38,200</span>",
    "FTSE 100: <span>8,150</span>",
    "BRENT CRUDE: <span>$98.5</span>",
    "NYMEX CRUDE: <span>$94.2</span>",
    "MSCI EM: <span>+0.6%</span>",
    "DOLLAR INDEX: <span>104.3</span>",
    "INDIA VIX: <span>12.8</span>"
  ];

  const container = document.getElementById("market-data");

  container.innerHTML = marketValues
    .map(item => `<div class="market-item">${item}</div>`)
    .join("");
</script>

</body>
</html>
