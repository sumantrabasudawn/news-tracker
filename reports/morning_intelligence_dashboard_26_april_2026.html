<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Aion Intelligence</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Helvetica, Arial, Calibri, sans-serif;
      background-color: #f6f1e9;
      color: #2b2b2b;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    /* Masthead */
    .masthead { text-align: center; margin-bottom: 30px; }
    .brand { font-size: 58px; font-weight: 800; letter-spacing: 0.05em; margin-bottom: 12px; }
    .aion { color: #ff6a00; }
    .intelligence { color: #2b2b2b; }
    .subhead { font-size: 22px; color: #6b6b6b; }

    /* Ticker */
    .market-bar {
      border-top: 1px solid #ded8cf;
      border-bottom: 1px solid #ded8cf;
      padding: 10px 0;
      margin: 25px 0 40px;
      overflow: hidden;
      white-space: nowrap;
      background: #f6f1e9;
    }
    .market-track {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 55s linear infinite;
    }
    .market-item {
      display: inline-block;
      margin-right: 40px;
      font-size: 14px;
      color: #444;
    }
    .market-value { font-weight: 700; color: #2b2b2b; }
    .market-up { color: #0a8f3c; font-weight: 800; }
    .market-down { color: #c62828; font-weight: 800; }
    .market-flat { color: #777; font-weight: 700; }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* Content */
    .card {
      background: white;
      padding: 30px;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
      line-height: 1.65;
    }

    .card h2 {
      font-size: 20px;
      margin-top: 30px;
      margin-bottom: 10px;
      border-bottom: 1px solid #ded8cf;
      padding-bottom: 6px;
    }

    /* Chart */
    .chart-container {
      margin: 30px 0;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Masthead -->
  <div class="masthead">
    <div class="brand">
      <span class="aion">AION</span>
      <span class="intelligence">INTELLIGENCE</span>
    </div>
    <div class="subhead" id="timestamp">
      Pulse Briefing and Analyses
    </div>
  </div>

  <!-- Ticker -->
  <div class="market-bar">
    <div class="market-track" id="market-data"></div>
  </div>

  <!-- Content -->
  <div class="card">

    <h2>Market Snapshot</h2>

    <div class="chart-container">
      <canvas id="oilChart"></canvas>
    </div>

    <p>Crude has moved steadily higher through the week, reinforcing inflation and currency concerns.</p>

    <div class="chart-container">
      <canvas id="riskChart"></canvas>
    </div>

    <p>Dollar strength and volatility remain elevated, suggesting tightening financial conditions.</p>

  </div>

</div>

<!-- Timestamp -->
<script>
  const options = {
    timeZone: 'Asia/Kolkata',
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  };
  document.getElementById("timestamp").innerHTML =
    "Pulse Briefing and Analyses | " +
    new Date().toLocaleString('en-IN', options) + " IST";
</script>

<!-- Market ticker -->
<script>
  const marketData = [
    { name: "DOW", value: "38,900", change: "+0.6" },
    { name: "NASDAQ", value: "16,200", change: "-0.3" },
    { name: "NIFTY", value: "22,400", change: "-0.2" },
    { name: "BRENT", value: "$98.5", change: "+1.1" },
    { name: "DXY", value: "104.3", change: "+0.2" },
    { name: "VIX", value: "12.8", change: "-1.5" }
  ];

  function cls(c){ return c.startsWith("+")?"market-up":c.startsWith("-")?"market-down":"market-flat"; }
  function arrow(c){ return c.startsWith("+")?"▲":c.startsWith("-")?"▼":"■"; }

  document.getElementById("market-data").innerHTML =
    marketData.map(m => `
      <div class="market-item">
        ${m.name}: <span class="market-value">${m.value}</span>
        <span class="${cls(m.change)}">${arrow(m.change)} ${m.change}%</span>
      </div>`).join("");
</script>

<!-- Charts -->
<script>
  // Oil chart
  new Chart(document.getElementById('oilChart'), {
    type: 'line',
    data: {
      labels: ['Mon','Tue','Wed','Thu','Fri'],
      datasets: [{
        label: 'Brent Crude ($)',
        data: [92,94,96,98,100],
        borderColor: '#ff6a00',
        borderWidth: 2
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: false } }
    }
  });

  // Risk chart
  new Chart(document.getElementById('riskChart'), {
    type: 'bar',
    data: {
      labels: ['Dollar','VIX','Oil'],
      datasets: [{
        label: 'Risk Indicators',
        data: [104,13,100],
        backgroundColor: ['#2b2b2b','#c62828','#ff6a00']
      }]
    },
    options: {
      plugins: { legend: { display: false } }
    }
  });
</script>

</body>
</html>
