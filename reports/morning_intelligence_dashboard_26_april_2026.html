<!DOCTYPE html>
<html>
<head>
  <title>Aion Intelligence</title>

  <style>
    body {
      font-family: Helvetica, Arial, Calibri, sans-serif;
      background-color: #f6f1e9;
      color: #2b2b2b;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    .masthead {
      text-align: center;
      margin-bottom: 50px;
    }

    .brand {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .aion { color: #ff6a00; }
    .intelligence { color: #2b2b2b; }

    .subhead {
      font-size: 24px;
      color: #6b6b6b;
    }

    .section {
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="masthead">
    <div class="brand">
      <span class="aion">AION</span>
      <span class="intelligence">INTELLIGENCE</span>
    </div>

    <div class="subhead">
      Pulse Briefing and Analyses |
      Sunday, 26 April 2026 | 13:47 IST
    </div>
  </div>

  <div class="section">
    <div class="card">
      Your intelligence content goes here.
    </div>
  </div>

</div>

</body>
</html>
