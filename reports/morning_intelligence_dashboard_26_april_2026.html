<!DOCTYPE html>
<html>
<head>
  <title>Aion Intelligence</title>

  <style>
    body {
      font-family: Helvetica, Arial, Calibri, sans-serif;
      background-color: #f6f1e9;
      color: #2b2b2b;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    /* MASTHEAD */

    .masthead {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .aion { color: #ff6a00; }
    .intelligence { color: #2b2b2b; }

    .subhead {
      font-size: 24px;
      color: #6b6b6b;
    }

    /* MARKET STRIP */

    .market-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 30px 0 40px;
    }

    .market-tile {
      background: #ffffff;
      border: 1px solid #e5dfd6;
      border-radius: 6px;
      padding: 14px 16px;
    }

    .market-label {
      font-size: 12px;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .market-value {
      font-size: 22px;
      font-weight: 700;
      margin-top: 6px;
      color: #2b2b2b;
    }

    .market-note {
      font-size: 12px;
      color: #777;
      margin-top: 4px;
    }

    @media (max-width: 800px) {
      .market-strip {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* CONTENT */

    .section {
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- MASTHEAD -->
  <div class="masthead">

    <div class="brand">
      <span class="aion">AION</span>
      <span class="intelligence">INTELLIGENCE</span>
    </div>

    <div class="subhead" id="timestamp">
      Pulse Briefing and Analyses
    </div>

  </div>

  <!-- MARKET STRIP -->
  <div class="market-strip">

    <div class="market-tile">
      <div class="market-label">Brent Crude</div>
      <div class="market-value">$100+</div>
      <div class="market-note">Oil-risk regime intact</div>
    </div>

    <div class="market-tile">
      <div class="market-label">USD / INR</div>
      <div class="market-value">~83–84</div>
      <div class="market-note">External pressure building</div>
    </div>

    <div class="market-tile">
      <div class="market-label">India Equities</div>
      <div class="market-value">Soft bias</div>
      <div class="market-note">FPI + oil drag</div>
    </div>

    <div class="market-tile">
      <div class="market-label">Trade Cue</div>
      <div class="market-value">FTA watch</div>
      <div class="market-note">NZ / EU / US tracks</div>
    </div>

  </div>

  <!-- CONTENT -->
  <div class="section">
    <div class="card">
      Your intelligence content goes here.
    </div>
  </div>

</div>

<!-- DYNAMIC TIMESTAMP -->
<script>
  const options = {
    timeZone: 'Asia/Kolkata',
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  };

  const now = new Date().toLocaleString('en-IN', options);

  document.getElementById("timestamp").innerHTML =
    "Pulse Briefing and Analyses | " + now + " IST";
</script>

</body>
</html>
