<!DOCTYPE html>
<html>
<head>
  <title>Aion Intelligence</title>

  <style>
    body {
      font-family: Helvetica, Arial, Calibri, sans-serif;
      background-color: #f6f1e9;
      color: #2b2b2b;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    .brand {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .aion { color: #ff6a00; }
    .intelligence { color: #2b2b2b; }

    h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .meta {
      color: #6b6b6b;
      margin-bottom: 30px;
    }

    .section {
      margin-bottom: 30px;
    }

    .section h2 {
      font-size: 14px;
      text-transform: uppercase;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="brand">
    <span class="aion">AION</span>
    <span class="intelligence">INTELLIGENCE</span>
  </div>

  <h1>Morning Intelligence Dashboard</h1>
  <div class="meta">
    26 April 2026 | For Limited Circulation
  </div>

  <div class="section">
    <h2>Executive Read</h2>
    <div class="card">
      The current configuration is not a generic risk-off market. It is a more selective repricing regime.
    </div>
  </div>

</div>

</body>
</html>
