<!DOCTYPE html>
<html>
<head>
  <title>Aion Intelligence</title>

  <style>
    body {
      font-family: Helvetica, Arial, Calibri, sans-serif;
      background-color: #f6f1e9;
      color: #2b2b2b;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    /* MASTHEAD */

    .masthead {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand {
      font-size: 58px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .aion { color: #ff6a00; }
    .intelligence { color: #2b2b2b; }

    .subhead {
      font-size: 22px;
      color: #6b6b6b;
    }

    /* TICKER */

    .market-bar {
      border-top: 1px solid #ded8cf;
      border-bottom: 1px solid #ded8cf;
      padding: 10px 0;
      margin: 25px 0 40px;
      overflow: hidden;
      white-space: nowrap;
      background: #f6f1e9;
    }

    .market-track {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 45s linear infinite;
    }

    .market-item {
      display: inline-block;
      margin-right: 40px;
      font-size: 14px;
      color: #444;
    }

    .market-item span {
      font-weight: 700;
      color: #2b2b2b;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* COLOR LOGIC */

    .market-up {
      color: #0a8f3c;
      font-weight: 700;
    }

    .market-down {
      color: #c62828;
      font-weight: 700;
    }

    .market-flat {
      color: #777;
      font-weight: 600;
    }

    /* CONTENT */

    .section {
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 22px;
      border-radius: 6px;
      border: 1px solid #e5e5e5;
      font-size: 16px;
      line-height: 1.6;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- MASTHEAD -->
  <div class="masthead">

    <div class="brand">
      <span class="aion">AION</span>
      <span class="intelligence">INTELLIGENCE</span>
    </div>

    <div class="subhead" id="timestamp">
      Pulse Briefing and Analyses
    </div>

  </div>

  <!-- MARKET TICKER -->
  <div class="market-bar">
    <div class="market-track" id="market-data"></div>
  </div>

  <!-- CONTENT -->
  <div class="section">
    <div class="card">
      Your intelligence content goes here.
    </div>
  </div>

</div>

<!-- DYNAMIC TIMESTAMP -->
<script>
  const options = {
    timeZone: 'Asia/Kolkata',
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  };

  const now = new Date().toLocaleString('en-IN', options);

  document.getElementById("timestamp").innerHTML =
    "Pulse Briefing and Analyses | " + now + " IST";
</script>

<!-- MARKET DATA WITH COLOR LOGIC -->
<script>
  const marketData = [
    { name: "DOW JONES", value: "38,900", change: "+0.6%" },
    { name: "NASDAQ", value: "16,200", change: "-0.3%" },
    { name: "S&P 500", value: "5,150", change: "+0.4%" },
    { name: "NIFTY 50", value: "22,400", change: "-0.2%" },
    { name: "SENSEX", value: "73,800", change: "-0.1%" },
    { name: "NIKKEI", value: "38,200", change: "+0.7%" },
    { name: "FTSE 100", value: "8,150", change: "+0.2%" },
    { name: "BRENT CRUDE", value: "$98.5", change: "+1.1%" },
    { name: "NYMEX CRUDE", value: "$94.2", change: "+0.9%" },
    { name: "MSCI EM", value: "+0.6%", change: "+0.6%" },
    { name: "DOLLAR INDEX", value: "104.3", change: "+0.2%" },
    { name: "INDIA VIX", value: "12.8", change: "-1.5%" }
  ];

  function getClass(change) {
    if (change.includes("+")) return "market-up";
    if (change.includes("-")) return "market-down";
    return "market-flat";
  }

  function getArrow(change) {
    if (change.includes("+")) return "▲";
    if (change.includes("-")) return "▼";
    return "■";
  }

  const container = document.getElementById("market-data");

  container.innerHTML = marketData.map(item => {
    const cls = getClass(item.change);
    const arrow = getArrow(item.change);

    return `
      <div class="market-item">
        ${item.name}: 
        <span>${item.value}</span>
        <span class="${cls}"> ${arrow} ${item.change}</span>
      </div>
    `;
  }).join("");
</script>

</body>
</html>
