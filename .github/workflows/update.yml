name: Update AION Dashboard

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python src/main.py

      - name: Commit changes
        run: |
          git config --global user.name "AION Bot"
          git config --global user.email "bot@aion.ai"
          git add .
          git commit -m "Auto update dashboard" || echo "No changes"
          git push