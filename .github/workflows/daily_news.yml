name: Daily Global News Tracker

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  run-news-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tracker
        run: |
          python src/main.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-output
          path: output/
